<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Noticeboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="sidebar hidden">
        <div class="logo">
            <h2>College Noticeboard</h2>
        </div>
        <button class="nav-btn active" data-type="all">All Notices</button>
        <button class="nav-btn" data-type="academic">Academic</button>
        <button class="nav-btn" data-type="events">Events</button>
        <button class="nav-btn" data-type="sports">Sports</button>
        <button class="nav-btn" data-type="examination">Examination</button>
        <button id="addNoticeBtn" class="nav-btn" style="display: none;">Add Notice</button>

    </div>

    <div class="main-content hidden">
        <div class="header">
            <h1>Vishwaportal</h1>
            <p>Stay updated with the latest announcements</p>
        </div>
        <div class="search-sort-container">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search notices..." id="searchInput">
            </div>
            <div class="sort-container">
                <label for="sortSelect">Sort by:</label>
                <select id="sortSelect" class="sort-select">
                    <option value="date-desc">Date (Newest First)</option>
                    <option value="date-asc">Date (Oldest First)</option>
                    <option value="title-asc">Title (A-Z)</option>
                    <option value="title-desc">Title (Z-A)</option>
                </select>
            </div>
        </div>
        <div class="notice-board" id="noticeBoard">
            <!-- Notices will be dynamically added here -->
        </div>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="loginBtn">Login</button>
        </div>
    </div>

    <div id="addNoticeModal" class="modal hidden">
        <div class="modal-content">
            <h2>Add New Notice</h2>
            <input type="text" id="noticeTitle" placeholder="Notice Title">
            <textarea id="noticeContent" placeholder="Notice Content" rows="4"></textarea>
            <select id="noticeType">
                <option value="">Select Notice Type</option>
                <option value="academic">Academic</option>
                <option value="events">Events</option>
                <option value="sports">Sports</option>
                <option value="examination">Examination</option>
            </select>
            <select id="noticePriority">
                <option value="low">Low Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="high">High Priority</option>
                <option value="urgent">Urgent</option>
            </select>
            <div class="file-upload">
                <label for="noticeAttachments">Attachments:</label>
                <input type="file" id="noticeAttachments" multiple>
                <div id="attachmentsList"></div>
            </div>
            <button id="postNoticeBtn">Post Notice</button>
            <button id="closeNoticeModalBtn">Cancel</button>
        </div>
    </div>

    <script src = "script.js"></script>

</body>

</html>
